<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>暇つぶしニャ</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🐱 暇つぶしニャ</h1>

<div class="card">

<div class="season">
🌸 春
</div>

<div id="cat">
🐱
</div>

<h2>おかえり、かのん🌸</h2>

<p id="message">
今日は5問だけ遊ぶニャ♪
</p>

<div class="status">

<div class="box">
⭐ Lv.1
</div>

<div class="box">
❤️ 今日 0 / 5問
</div>

<div class="progress-bar">
    <div class="progress-fill" id="progressFill"></div>
</div>

<div class="box">
📚 復習 0問
</div>
    
<button id="play">
🎮 遊ぶ
</button>

<div id="quiz" class="card" style="display:none; margin-top:20px;">
    <h2>📖 第1問</h2>

    <p id="question">
        1 + 2 = ?
    </p>

    <button class="answer">① 2</button>
    <button class="answer">② 3</button>
    <button class="answer">③ 4</button>
</div>
    
<button>
🐾 復習
</button>

<button>
🎨 うちの子メーカー
</button>

<button>
🏠 お部屋
</button>

<button>
📊 成績
</button>

<button>
⚙️ 設定
</button>

</div>

<div class="grass">

<div class="flower">🌸</div>

<div class="flower">🌼</div>

<div class="flower">🍀</div>

</div>
  
<footer>

試験まであと
<span id="days">--</span>
日

</footer>

</div>

<script src="app.js"></script>

</body>
</html>
