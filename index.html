
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>暇つぶしニャ</title>

  <style>
    body{
      margin:0;
      font-family:sans-serif;
      background:#fff6f8;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
    }

    .card{
      width:340px;
      background:white;
      border-radius:25px;
      padding:25px;
      text-align:center;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    h1{
      color:#ff8ca8;
      margin-bottom:5px;
    }

    .cat{
      font-size:90px;
      margin:20px 0;
    }

    .message{
      color:#666;
      font-size:18px;
      margin-bottom:25px;
    }

    button{
      width:100%;
      padding:15px;
      margin:8px 0;
      border:none;
      border-radius:15px;
      background:#ffd7e2;
      font-size:18px;
      cursor:pointer;
    }

    button:hover{
      background:#ffc3d4;
    }

  </style>

</head>

<body>

<div class="card">

<h1>🐱 暇つぶしニャ</h1>

<p>おかえり、かのん🌸</p>

<div class="cat">🐱</div>

<div class="message">

今日は5問だけ遊ぶニャ♪

</div>

<button>▶ 遊ぶ</button>

<button>🐾 復習する</button>

<button>🏠 お部屋</button>

<button>📈 成績</button>

</div>

</body>

</html>
